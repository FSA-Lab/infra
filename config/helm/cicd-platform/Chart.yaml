apiVersion: v2
name: cicd-platform
description: AKS-oriented CI/CD platform stack for Jenkins, SonarQube Community Build, Keycloak, and ingress.
type: application

version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: ingress-nginx
    version: 4.15.0
    repository: https://kubernetes.github.io/ingress-nginx

  - name: jenkins
    version: 5.9.18
    repository: https://charts.jenkins.io

  - name: sonarqube
    version: 2026.2.1
    repository: https://SonarSource.github.io/helm-chart-sonarqube

  - name: keycloak
    version: 25.2.0
    repository: https://charts.bitnami.com/bitnami
