apiVersion: v1
kind: Secret
metadata:
  name: keycloak-postgresql
type: Opaque
stringData:
  password: {{.Values.secrets.postgresql.password | quote}}
  postgres-password: {{.Values.secrets.postgresql.postgresPassword | quote}}

---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin
type: Opaque
stringData:
  admin-user: {{.Values.secrets.keycloak.adminUser | quote}}
  admin-password: {{.Values.secrets.keycloak.adminPassword | quote}}

---
apiVersion: v1
kind: Secret
metadata:
  name: jenkins-admin
type: Opaque
stringData:
  jenkins-admin-user: {{.Values.secrets.jenkins.adminUser | quote}}
  jenkins-admin-password: {{.Values.secrets.jenkins.adminPassword | quote}}

---
apiVersion: v1
kind: Secret
metadata:
  name: sonarqube-monitoring
type: Opaque
stringData:
  monitoring-passcode: {{.Values.secrets.sonarqube.monitoringPasscode | quote}}

{{- if .Values.secrets.sonarqube.adminPassword }}
---
apiVersion: v1
kind: Secret
metadata:
  name: sonarqube-admin-password
type: Opaque
stringData:
  password: {{ .Values.secrets.sonarqube.adminPassword | quote }}
  currentPassword: {{ .Values.secrets.sonarqube.currentAdminPassword | quote }}
{{- end }}

---
apiVersion: v1
kind: Secret
metadata:
  name: jenkins-oidc
type: Opaque
stringData:
  client-id: {{.Values.secrets.jenkins.oidc.clientId | quote}}
  client-secret: {{.Values.secrets.jenkins.oidc.clientSecret | quote}}

{{- if or .Values.secrets.jenkins.proxy.httpProxy .Values.secrets.jenkins.proxy.httpsProxy .Values.secrets.jenkins.proxy.noProxy }}
---
apiVersion: v1
kind: Secret
metadata:
  name: jenkins-proxy
type: Opaque
stringData:
  http-proxy: {{.Values.secrets.jenkins.proxy.httpProxy | default "" | quote}}
  https-proxy: {{.Values.secrets.jenkins.proxy.httpsProxy | default "" | quote}}
  no-proxy: {{.Values.secrets.jenkins.proxy.noProxy | default "" | quote}}
{{- end }}

{{- if .Values.secrets.cloudflare.apiToken }}
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-provider-credentials
type: Opaque
stringData:
  api-token: {{ .Values.secrets.cloudflare.apiToken | quote }}
  cloudflare_api_token: {{ .Values.secrets.cloudflare.apiToken | quote }}
{{- end }}
