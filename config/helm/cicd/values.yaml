global:
  domain: cicdlab.vtvinh24.dev
  security:
    allowInsecureImages: true

################################################################################
# Secrets
################################################################################
secrets:
  postgresql:
    password: ""
    postgresPassword: ""

  keycloak:
    adminUser: ""
    adminPassword: ""

  jenkins:
    adminUser: ""
    adminPassword: ""

    oidc:
      clientId: jenkins
      clientSecret: ""

    proxy:
      # Example: http://proxy.example.com:8080
      httpProxy: ""
      # Example: http://proxy.example.com:8080 (proxy endpoint for HTTPS traffic)
      httpsProxy: ""
      # Comma-separated domains/IPs that should bypass proxy.
      noProxy: ""

  sonarqube:
    monitoringPasscode: ""
    adminPassword: ""
    currentAdminPassword: ""

  cloudflare:
    apiToken: ""

cert-manager:
  installCRDs: false # explicitly set to false to avoid issues with idempotency and upgradeability when applying CRDs via Helm
  enabled: false

certManagerConfig:
  clusterIssuer:
    enabled: true
    name: letsencrypt-cloudflare
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ""
    privateKeySecretName: letsencrypt-cloudflare-private-key
    cloudflare:
      secretName: cloudflare-provider-credentials
      apiTokenKey: api-token

external-dns:
  provider: cloudflare
  policy: sync
  registry: txt
  txtOwnerId: cicd

  env:
    - name: CF_API_TOKEN
      valueFrom:
        secretKeyRef:
          name: cloudflare-provider-credentials
          key: api-token
  
  logLevel: debug

  sources:
    # - service
    - ingress

  domainFilters:
    - vtvinh24.dev
  fqdnTemplates: []

ingress-nginx:
  controller:
    nodeSelector:
      workload: tools

    tolerations:
      - key: workload
        operator: Equal
        value: tools
        effect: NoSchedule

    admissionWebhooks:
      failurePolicy: Ignore

      patch:
        nodeSelector:
          workload: tools

        tolerations:
          - key: workload
            operator: Equal
            value: tools
            effect: NoSchedule

    service:
      annotations:
        service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: /healthz
        external-dns.alpha.kubernetes.io/exclude: "true"

      externalTrafficPolicy: Local

################################################################################
# JENKINS
################################################################################

jenkins:
  controller:
    nodeSelector:
      workload: tools

    image:
      repository: jenkins/jenkins
      tag: lts-jdk21

    tolerations:
      - key: workload
        operator: Equal
        value: tools
        effect: NoSchedule

    admin:
      existingSecret: jenkins-admin
      userKey: jenkins-admin-user
      passwordKey: jenkins-admin-password

    persistence:
      enabled: true
      storageClass: managed-csi
      size: 50Gi

    resources:
      requests:
        cpu: 500m
        memory: 1Gi

      limits:
        cpu: 2
        memory: 4Gi

    ingress:
      enabled: true
      ingressClassName: nginx
      hostName: "jenkins.cicdlab.vtvinh24.dev"
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-cloudflare
      tls:
        - hosts:
            - "jenkins.cicdlab.vtvinh24.dev"
          secretName: jenkins-tls

    serviceType: ClusterIP

    installPlugins:
      - kubernetes
      - configuration-as-code
      - workflow-aggregator
      - git
      - credentials-binding
      - pipeline-stage-view
      - blueocean
      - job-dsl
      - sonar
      - oic-auth

    # Keep both uppercase and lowercase proxy vars for compatibility across Java, curl, and plugin tooling.
    initContainerEnv:
      - &jenkinsHttpProxyEnv
        name: HTTP_PROXY
        valueFrom:
          secretKeyRef:
            name: jenkins-proxy
            key: http-proxy
            optional: true
      - &jenkinsHttpsProxyEnv
        name: HTTPS_PROXY
        valueFrom:
          secretKeyRef:
            name: jenkins-proxy
            key: https-proxy
            optional: true
      - &jenkinsNoProxyEnv
        name: NO_PROXY
        valueFrom:
          secretKeyRef:
            name: jenkins-proxy
            key: no-proxy
            optional: true
      - &jenkinsHttpProxyEnvLower
        name: http_proxy
        valueFrom:
          secretKeyRef:
            name: jenkins-proxy
            key: http-proxy
            optional: true
      - &jenkinsHttpsProxyEnvLower
        name: https_proxy
        valueFrom:
          secretKeyRef:
            name: jenkins-proxy
            key: https-proxy
            optional: true
      - &jenkinsNoProxyEnvLower
        name: no_proxy
        valueFrom:
          secretKeyRef:
            name: jenkins-proxy
            key: no-proxy
            optional: true
      - name: JENKINS_UC_DOWNLOAD
        value: "https://sg.mirror.servanamanaged.com/jenkins"
      - name: JENKINS_UC
        value: "https://updates.jenkins.io"

    containerEnv:
      - *jenkinsHttpProxyEnv
      - *jenkinsHttpsProxyEnv
      - *jenkinsNoProxyEnv
      - *jenkinsHttpProxyEnvLower
      - *jenkinsHttpsProxyEnvLower
      - *jenkinsNoProxyEnvLower
      - name: KEYCLOAK_CLIENT_ID
        valueFrom:
          secretKeyRef:
            name: jenkins-oidc
            key: client-id

      - name: KEYCLOAK_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: jenkins-oidc
            key: client-secret

    JCasC:
      defaultConfig: false

      configScripts:
        security-and-clouds: |
          jenkins:
            numExecutors: 0
            clouds:
              - kubernetes:
                  name: "kubernetes"
                  namespace: "cicd"
                  jenkinsUrl: "http://cicd-jenkins.cicd.svc.cluster.local:8080"
                  containerCapStr: "20"
                  retentionTimeout: 5
                  webSocket: true
                  directConnection: true
                  templates:
                    - name: "cicd-agent"
                      namespace: "cicd"
                      label: "cicd-agent"
                      nodeUsageMode: NORMAL
                      serviceAccount: "jenkins-agent"
                      yaml: |
                        apiVersion: v1
                        kind: Pod
                        metadata:
                          labels:
                            app: jenkins-agent
                        spec:
                          serviceAccountName: jenkins-agent
                          restartPolicy: Never
                          nodeSelector:
                            workload: tools
                          tolerations:
                            - key: workload
                              operator: Equal
                              value: tools
                              effect: NoSchedule
                          containers:
                            - name: jnlp
                              image: jenkins/inbound-agent:jdk17
                              resources:
                                requests:
                                  cpu: "250m"
                                  memory: "512Mi"
                            - name: buildkit
                              image: moby/buildkit:v0.29.0-rootless
                              securityContext:
                                privileged: true
                              command:
                                - sh
                                - -c
                                - |
                                  buildkitd \
                                    --addr unix:///run/buildkit/buildkitd.sock
                              volumeMounts:
                                - name: buildkit-socket
                                  mountPath: /run/buildkit
                                - name: docker-config
                                  mountPath: /root/.docker
                            - name: trivy
                              image: aquasec/trivy:0.70.0
                              command:
                                - cat
                              tty: true
                            - name: kubectl
                              image: bitnami/kubectl:1.33
                              command:
                                - cat
                              tty: true
                            - name: helm
                              image: alpine/helm:3.18.0
                              command:
                                - cat
                              tty: true
                            - name: azure-cli
                              image: mcr.microsoft.com/azure-cli
                              command:
                                - cat
                              tty: true
                              env:
                                - name: AZURE_CLIENT_ID
                                  valueFrom:
                                    secretKeyRef:
                                      name: azure-sp
                                      key: client-id
                                - name: AZURE_CLIENT_SECRET
                                  valueFrom:
                                    secretKeyRef:
                                      name: azure-sp
                                      key: client-secret
                                - name: AZURE_TENANT_ID
                                  valueFrom:
                                    secretKeyRef:
                                      name: azure-sp
                                      key: tenant-id
                          volumes:
                            - name: buildkit-socket
                              emptyDir: {}
                            - name: docker-config
                              secret:
                                secretName: acr-creds
            securityRealm:
              oic:
                clientId: "${KEYCLOAK_CLIENT_ID}"
                clientSecret: "${KEYCLOAK_CLIENT_SECRET}"
                serverConfiguration:
                  wellKnown:
                    wellKnownOpenIDConfigurationUrl: "https://keycloak.cicdlab.vtvinh24.dev/realms/cicd/.well-known/openid-configuration"
                userNameField: "preferred_username"
                fullNameFieldName: "name"
                emailFieldName: "email"
                groupsFieldName: "groups"
                disableSslVerification: false
            authorizationStrategy:
              loggedInUsersCanDoAnything:
                allowAnonymousRead: false

################################################################################
# SONARQUBE
################################################################################

sonarqube:
  community:
    enabled: true

  monitoringPasscodeSecretName: sonarqube-monitoring
  monitoringPasscodeSecretKey: monitoring-passcode

  nodeSelector:
    workload: tools

  tolerations:
    - key: workload
      operator: Equal
      value: tools
      effect: NoSchedule

  resources:
    requests:
      cpu: 500m
      memory: 2Gi

    limits:
      cpu: 2
      memory: 4Gi

  ingress:
    enabled: true

    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-cloudflare

    hosts:
      - name: sonarqube.cicdlab.vtvinh24.dev
        path: /
    tls:
      - secretName: sonarqube-tls
        hosts:
          - sonarqube.cicdlab.vtvinh24.dev

  postgresql:
    enabled: false

  jdbcOverwrite:
    enabled: true
    jdbcUrl: "jdbc:postgresql://postgres:5432/keycloak"
    jdbcUsername: "keycloak"
    jdbcSecretName: "keycloak-postgresql"
    jdbcSecretPasswordKey: password

################################################################################
# KEYCLOAK
################################################################################

keycloak:
  nodeSelector:
    workload: tools

  tolerations:
    - key: workload
      operator: Equal
      value: tools
      effect: NoSchedule

  image:
    repository: quay.io/keycloak/keycloak
    tag: 26.3.3
  args:
    - start

  extraEnv: |
    - name: KEYCLOAK_ADMIN
      valueFrom:
        secretKeyRef:
          name: keycloak-admin
          key: admin-user
    - name: KEYCLOAK_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: keycloak-admin
          key: admin-password
    - name: KC_HOSTNAME
      value: keycloak.cicdlab.vtvinh24.dev

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-cloudflare
    rules:
      - host: keycloak.cicdlab.vtvinh24.dev
        paths:
          - path: /auth/
            pathType: Prefix
    tls:
      - hosts:
          - keycloak.cicdlab.vtvinh24.dev
        secretName: keycloak-tls

  resources:
    requests:
      cpu: 500m
      memory: 1Gi

    limits:
      cpu: 2
      memory: 4Gi

  database:
    vendor: postgres
    hostname: postgres
    port: 5432
    database: keycloak
    username: keycloak
    existingSecret: keycloak-postgresql
    existingSecretKey: password

################################################################################
# POSTGRESQL
################################################################################

postgresql:
  enabled: true

  fullnameOverride: postgres

  auth:
    existingSecret: keycloak-postgresql
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password

    username: keycloak
    database: keycloak

  primary:
    persistence:
      enabled: true
      storageClass: managed-csi # AKS-specific storage class
      size: 20Gi

    nodeSelector:
      workload: tools

    tolerations:
      - key: workload
        operator: Equal
        value: tools
        effect: NoSchedule
