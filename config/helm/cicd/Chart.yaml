apiVersion: v2
name: cicd
description: Unified CI/CD infrastructure
type: application
icon: https://dummyjson.com/image/150
version: 0.1.0

dependencies:
  - name: ingress-nginx
    version: "4.15.1"
    repository: "https://kubernetes.github.io/ingress-nginx"

  - name: jenkins
    version: "5.9.18"
    repository: "https://charts.jenkins.io"

  - name: sonarqube
    version: "2026.2.1"
    repository: "https://SonarSource.github.io/helm-chart-sonarqube"

  - name: keycloakx
    alias: keycloak
    version: "7.1.11"
    repository: "https://codecentric.github.io/helm-charts"

  # This one is to prevent conflicts with the postgresql dependency of sonarqube and keycloak
  - name: postgresql
    version: "18.6.4"
    repository: "https://charts.bitnami.com/bitnami"

  - name: cert-manager
    version: "v1.20.2"
    repository: "https://charts.jetstack.io"

  - name: external-dns
    version: "1.21.1"
    repository: "https://kubernetes-sigs.github.io/external-dns/"
