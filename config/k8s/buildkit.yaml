apiVersion: v1
kind: ConfigMap
metadata:
  name: buildkitd-config
  namespace: cicd
data:
  buildkitd.toml: |
    [worker.oci]
      gc = true
      max-parallelism = 8
    [registry."ghcr.io"]
      http = false
      insecure = false
    [registry."your-registry.azurecr.io"]
      http = false
      insecure = false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildkitd
  namespace: cicd
  labels:
    app.kubernetes.io/name: buildkitd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: buildkitd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: buildkitd
    spec:
      serviceAccountName: buildkit
      nodeSelector:
        workload: tools
      tolerations:
        - key: workload
          operator: Equal
          value: tools
          effect: NoSchedule
      containers:
        - name: buildkitd
          image: moby/buildkit:v0.16.0
          args:
            - --addr
            - tcp://0.0.0.0:1234
            - --config
            - /etc/buildkit/buildkitd.toml
          ports:
            - containerPort: 1234
              name: grpc
          securityContext:
            privileged: true
          volumeMounts:
            - mountPath: /etc/buildkit
              name: buildkitd-config
            - mountPath: /root/.docker
              name: registry-auth
      volumes:
        - name: buildkitd-config
          configMap:
            name: buildkitd-config
        - name: registry-auth
          secret:
            secretName: buildkit-registry-auth
---
apiVersion: v1
kind: Service
metadata:
  name: buildkitd
  namespace: cicd
spec:
  selector:
    app.kubernetes.io/name: buildkitd
  ports:
    - name: grpc
      port: 1234
      targetPort: 1234
