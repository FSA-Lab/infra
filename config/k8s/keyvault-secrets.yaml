apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: cicd-kv-sync
  namespace: cicd
spec:
  provider: azure
  parameters:
    useWorkloadIdentity: "true"
    clientID: "00000000-0000-0000-0000-000000000000"
    keyvaultName: "replace-with-keyvault-name"
    tenantId: "00000000-0000-0000-0000-000000000000"
    cloudName: ""
    objects: |
      array:
        - |
          objectName: jenkins-admin-user
          objectType: secret
        - |
          objectName: jenkins-admin-password
          objectType: secret
        - |
          objectName: keycloak-admin-user
          objectType: secret
        - |
          objectName: keycloak-admin-password
          objectType: secret
        - |
          objectName: sonarqube-admin-password
          objectType: secret
        - |
          objectName: keycloak-postgresql-password
          objectType: secret
        - |
          objectName: github-packages-username
          objectType: secret
        - |
          objectName: github-packages-token
          objectType: secret
        - |
          objectName: acr-server
          objectType: secret
        - |
          objectName: acr-username
          objectType: secret
        - |
          objectName: acr-password
          objectType: secret
        - |
          objectName: docker-config-json
          objectType: secret
  secretObjects:
    - secretName: jenkins-admin
      type: Opaque
      data:
        - objectName: jenkins-admin-user
          key: jenkins-admin-user
        - objectName: jenkins-admin-password
          key: jenkins-admin-password
    - secretName: keycloak-admin
      type: Opaque
      data:
        - objectName: keycloak-admin-user
          key: admin-user
        - objectName: keycloak-admin-password
          key: admin-password
    - secretName: sonarqube-admin
      type: Opaque
      data:
        - objectName: sonarqube-admin-password
          key: password
    - secretName: keycloak-postgresql
      type: Opaque
      data:
        - objectName: keycloak-postgresql-password
          key: postgres-password
        - objectName: keycloak-postgresql-password
          key: password
    - secretName: buildkit-registry-auth
      type: kubernetes.io/dockerconfigjson
      data:
        - objectName: docker-config-json
          key: .dockerconfigjson
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keyvault-secret-sync
  namespace: cicd
  labels:
    app.kubernetes.io/name: keyvault-secret-sync
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keyvault-secret-sync
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keyvault-secret-sync
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: cicd-secrets-sa
      nodeSelector:
        workload: tools
      tolerations:
        - key: workload
          operator: Equal
          value: tools
          effect: NoSchedule
      containers:
        - name: hold
          image: mcr.microsoft.com/oss/busybox/busybox:1.36
          command: ["/bin/sh", "-c", "sleep infinity"]
          volumeMounts:
            - name: kv-secrets
              mountPath: /mnt/secrets-store
              readOnly: true
      volumes:
        - name: kv-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: cicd-kv-sync
