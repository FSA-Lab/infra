apiVersion: apps/v1
kind: Deployment
metadata:
  name: trivy
  namespace: cicd
  labels:
    app.kubernetes.io/name: trivy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: trivy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trivy
    spec:
      serviceAccountName: trivy
      nodeSelector:
        workload: tools
      tolerations:
        - key: workload
          operator: Equal
          value: tools
          effect: NoSchedule
      containers:
        - name: trivy
          image: aquasec/trivy:0.51.2
          args:
            - server
            - --listen
            - 0.0.0.0:4954
          ports:
            - containerPort: 4954
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: trivy
  namespace: cicd
spec:
  selector:
    app.kubernetes.io/name: trivy
  ports:
    - name: http
      port: 4954
      targetPort: 4954
