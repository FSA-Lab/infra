# On infra code changed, sync to Azure
name: Terraform Deploy
on:
  push:
    branches: [main]
  # pull_request:
  #   branches: [main]

jobs:
  terraform-deploy:
    runs-on: ubuntu-latest
    env:
      KEYCLOAK_POSTGRESQL_PASSWORD: ${{ secrets.KEYCLOAK_POSTGRESQL_PASSWORD }}
      KEYCLOAK_POSTGRESQL_ADMIN_PASSWORD: ${{ secrets.KEYCLOAK_POSTGRESQL_ADMIN_PASSWORD }}
      KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
      JENKINS_ADMIN_PASSWORD: ${{ secrets.JENKINS_ADMIN_PASSWORD }}
      JENKINS_OIDC_CLIENT_SECRET: ${{ secrets.JENKINS_OIDC_CLIENT_SECRET }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      DNS_ROOT: ${{ vars.DNS_ROOT }}
      SONARQUBE_MONITORING_PASSCODE: ${{ secrets.SONARQUBE_MONITORING_PASSCODE }}
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
      TF_VAR_AKS_APPS_NODE_COUNT: ${{ vars.TF_VAR_AKS_APPS_NODE_COUNT }}
      TF_VAR_AKS_APPS_VM_SIZE: ${{ vars.TF_VAR_AKS_APPS_VM_SIZE }}
      TF_VAR_AKS_DNS_PREFIX: ${{ vars.TF_VAR_AKS_DNS_PREFIX }}
      TF_VAR_AKS_DNS_SERVICE_IP: ${{ vars.TF_VAR_AKS_DNS_SERVICE_IP }}
      TF_VAR_AKS_KUBERNETES_VERSION: ${{ vars.TF_VAR_AKS_KUBERNETES_VERSION }}
      TF_VAR_AKS_LOCATION: ${{ vars.TF_VAR_AKS_LOCATION }}
      TF_VAR_AKS_LOG_ANALYTICS_RETENTION_DAYS: ${{ vars.TF_VAR_AKS_LOG_ANALYTICS_RETENTION_DAYS }}
      TF_VAR_AKS_LOG_ANALYTICS_SKU: ${{ vars.TF_VAR_AKS_LOG_ANALYTICS_SKU }}
      TF_VAR_AKS_LOG_ANALYTICS_WORKSPACE_NAME: ${{ vars.TF_VAR_AKS_LOG_ANALYTICS_WORKSPACE_NAME }}
      TF_VAR_AKS_NAME: ${{ vars.TF_VAR_AKS_NAME }}
      TF_VAR_AKS_NETWORK_PLUGIN: ${{ vars.TF_VAR_AKS_NETWORK_PLUGIN }}
      TF_VAR_AKS_NETWORK_POLICY: ${{ vars.TF_VAR_AKS_NETWORK_POLICY }}
      TF_VAR_AKS_RESOURCE_GROUP_NAME: ${{ vars.TF_VAR_AKS_RESOURCE_GROUP_NAME }}
      TF_VAR_AKS_SERVICE_CIDR: ${{ vars.TF_VAR_AKS_SERVICE_CIDR }}
      TF_VAR_AKS_SUBNET_ADDRESS_PREFIXES: ${{ vars.TF_VAR_AKS_SUBNET_ADDRESS_PREFIXES }}
      TF_VAR_AKS_SUBNET_NAME: ${{ vars.TF_VAR_AKS_SUBNET_NAME }}
      TF_VAR_AKS_SYSTEM_NODE_COUNT: ${{ vars.TF_VAR_AKS_SYSTEM_NODE_COUNT }}
      TF_VAR_AKS_SYSTEM_VM_SIZE: ${{ vars.TF_VAR_AKS_SYSTEM_VM_SIZE }}
      TF_VAR_AKS_TAGS: ${{ vars.TF_VAR_AKS_TAGS }}
      TF_VAR_AKS_TOOLS_NODE_COUNT: ${{ vars.TF_VAR_AKS_TOOLS_NODE_COUNT }}
      TF_VAR_AKS_TOOLS_VM_SIZE: ${{ vars.TF_VAR_AKS_TOOLS_VM_SIZE }}
      TF_VAR_AKS_VNET_ADDRESS_SPACE: ${{ vars.TF_VAR_AKS_VNET_ADDRESS_SPACE }}
      TF_VAR_AKS_VNET_NAME: ${{ vars.TF_VAR_AKS_VNET_NAME }}
      TF_VAR_FUNCTIONS_ACCOUNT_REPLICATION_TYPE: ${{ vars.TF_VAR_FUNCTIONS_ACCOUNT_REPLICATION_TYPE }}
      TF_VAR_FUNCTIONS_ACCOUNT_TIER: ${{ vars.TF_VAR_FUNCTIONS_ACCOUNT_TIER }}
      TF_VAR_FUNCTIONS_APP_SETTINGS: ${{ vars.TF_VAR_FUNCTIONS_APP_SETTINGS }}
      TF_VAR_FUNCTIONS_FUNCTION_APP_NAME: ${{ vars.TF_VAR_FUNCTIONS_FUNCTION_APP_NAME }}
      TF_VAR_FUNCTIONS_LOCATION: ${{ vars.TF_VAR_FUNCTIONS_LOCATION }}
      TF_VAR_FUNCTIONS_LOG_ANALYTICS_WORKSPACE_NAME: ${{ vars.TF_VAR_FUNCTIONS_LOG_ANALYTICS_WORKSPACE_NAME }}
      TF_VAR_FUNCTIONS_LOG_ANALYTICS_SKU: ${{ vars.TF_VAR_FUNCTIONS_LOG_ANALYTICS_SKU }}
      TF_VAR_FUNCTIONS_LOG_ANALYTICS_RETENTION_DAYS: ${{ vars.TF_VAR_FUNCTIONS_LOG_ANALYTICS_RETENTION_DAYS }}
      TF_VAR_FUNCTIONS_APP_INSIGHTS_NAME: ${{ vars.TF_VAR_FUNCTIONS_APP_INSIGHTS_NAME }}
      TF_VAR_FUNCTIONS_MIN_TLS_VERSION: ${{ vars.TF_VAR_FUNCTIONS_MIN_TLS_VERSION }}
      TF_VAR_FUNCTIONS_OS_TYPE: ${{ vars.TF_VAR_FUNCTIONS_OS_TYPE }}
      TF_VAR_FUNCTIONS_POSTGRES_SERVER_NAME: ${{ vars.TF_VAR_FUNCTIONS_POSTGRES_SERVER_NAME }}
      TF_VAR_FUNCTIONS_POSTGRES_VERSION: ${{ vars.TF_VAR_FUNCTIONS_POSTGRES_VERSION }}
      TF_VAR_FUNCTIONS_POSTGRES_ADMIN_LOGIN: ${{ vars.TF_VAR_FUNCTIONS_POSTGRES_ADMIN_LOGIN }}
      TF_VAR_FUNCTIONS_POSTGRES_ADMIN_PASSWORD: ${{ secrets.TF_VAR_FUNCTIONS_POSTGRES_ADMIN_PASSWORD }}
      TF_VAR_FUNCTIONS_POSTGRES_SKU_NAME: ${{ vars.TF_VAR_FUNCTIONS_POSTGRES_SKU_NAME }}
      TF_VAR_FUNCTIONS_POSTGRES_STORAGE_MB: ${{ vars.TF_VAR_FUNCTIONS_POSTGRES_STORAGE_MB }}
      TF_VAR_FUNCTIONS_POSTGRES_BACKUP_RETENTION_DAYS: ${{ vars.TF_VAR_FUNCTIONS_POSTGRES_BACKUP_RETENTION_DAYS }}
      TF_VAR_FUNCTIONS_POSTGRES_GEO_REDUNDANT_BACKUP_ENABLED: ${{ vars.TF_VAR_FUNCTIONS_POSTGRES_GEO_REDUNDANT_BACKUP_ENABLED }}
      TF_VAR_FUNCTIONS_POSTGRES_PUBLIC_NETWORK_ACCESS_ENABLED: ${{ vars.TF_VAR_FUNCTIONS_POSTGRES_PUBLIC_NETWORK_ACCESS_ENABLED }}
      TF_VAR_FUNCTIONS_POSTGRES_DB_NAME: ${{ vars.TF_VAR_FUNCTIONS_POSTGRES_DB_NAME }}
      TF_VAR_FUNCTIONS_POSTGRES_DB_CHARSET: ${{ vars.TF_VAR_FUNCTIONS_POSTGRES_DB_CHARSET }}
      TF_VAR_FUNCTIONS_POSTGRES_DB_COLLATION: ${{ vars.TF_VAR_FUNCTIONS_POSTGRES_DB_COLLATION }}
      TF_VAR_FUNCTIONS_POSTGRES_ALLOW_AZURE_SERVICES: ${{ vars.TF_VAR_FUNCTIONS_POSTGRES_ALLOW_AZURE_SERVICES }}
      TF_VAR_FUNCTIONS_POSTGRES_FIREWALL_RULES: ${{ vars.TF_VAR_FUNCTIONS_POSTGRES_FIREWALL_RULES }}
      TF_VAR_FUNCTIONS_RESOURCE_GROUP_NAME: ${{ vars.TF_VAR_FUNCTIONS_RESOURCE_GROUP_NAME }}
      TF_VAR_FUNCTIONS_RUN_FROM_PACKAGE: ${{ vars.TF_VAR_FUNCTIONS_RUN_FROM_PACKAGE }}
      TF_VAR_FUNCTIONS_SERVICEBUS_NAMESPACE_NAME: ${{ vars.TF_VAR_FUNCTIONS_SERVICEBUS_NAMESPACE_NAME }}
      TF_VAR_FUNCTIONS_SERVICEBUS_QUEUES: ${{ vars.TF_VAR_FUNCTIONS_SERVICEBUS_QUEUES }}
      TF_VAR_FUNCTIONS_SERVICEBUS_QUEUE_PARTITIONING_ENABLED: ${{ vars.TF_VAR_FUNCTIONS_SERVICEBUS_QUEUE_PARTITIONING_ENABLED }}
      TF_VAR_FUNCTIONS_SERVICEBUS_SKU: ${{ vars.TF_VAR_FUNCTIONS_SERVICEBUS_SKU }}
      TF_VAR_FUNCTIONS_SERVICE_PLAN_NAME: ${{ vars.TF_VAR_FUNCTIONS_SERVICE_PLAN_NAME }}
      TF_VAR_FUNCTIONS_SKU_NAME: ${{ vars.TF_VAR_FUNCTIONS_SKU_NAME }}
      TF_VAR_FUNCTIONS_STORAGE_ACCOUNT_NAME: ${{ vars.TF_VAR_FUNCTIONS_STORAGE_ACCOUNT_NAME }}
      TF_VAR_FUNCTIONS_TAGS: ${{ vars.TF_VAR_FUNCTIONS_TAGS }}
      TF_VAR_FUNCTIONS_WORKER_RUNTIME: ${{ vars.TF_VAR_FUNCTIONS_WORKER_RUNTIME }}

    steps:
      # Checkout the repository
      - uses: actions/checkout@v4
        name: Checkout source code

      # Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # Cache plugins (after install, before init)
      - name: Cache Terraform plugins
        uses: actions/cache@v3
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-${{ runner.os }}-${{ hashFiles('**/.terraform.lock.hcl') }}

      - name: Configure plugin cache
        run: |
          mkdir -p ${{ env.TF_PLUGIN_CACHE_DIR }}
          echo 'plugin_cache_dir="$HOME/.terraform.d/plugin-cache"' > ~/.terraformrc

      # Setup Azure CLI
      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: "${{ secrets.AZURE_CREDENTIALS }}"

      - name: Setup Azure CLI
        uses: azure/cli@v3
        with:
          azcliversion: latest
          inlineScript: |
            az account show
            az storage -h

      # Run the Terraform deployment script
      - name: Run Terraform Deployment
        run: ./scripts/apply-infra.sh

      # Run the Helm deployment script
      - name: Run Helm Deployment
        run: ./scripts/helm.sh
